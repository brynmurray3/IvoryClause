- { box-sizing: border-box; margin: 0; padding: 0; }
  :root { color-scheme: light only; }
  html, body {
  background: #f5f0e8 !important;
  color: #1a1a1a !important;
  height: 100%;
  font-family: ‘DM Sans’, sans-serif;
  }

body {
display: flex;
flex-direction: column;
min-height: 100vh;
padding: 48px 64px;
}

.wordmark {
font-family: ‘MeshedDisplay’, serif;
font-size: clamp(2.8rem, 5vw, 4.2rem);
letter-spacing: 0.04em;
text-transform: uppercase;
color: #1a1a1a;
text-decoration: none;
}

.main {
flex: 1;
display: flex;
flex-direction: column;
justify-content: center;
max-width: 700px;
}

.eyebrow {
font-family: ‘DM Sans’, sans-serif;
font-size: 0.58rem;
letter-spacing: 0.28em;
text-transform: uppercase;
color: #ff4500;
margin-bottom: 32px;
display: flex;
align-items: center;
gap: 14px;
font-weight: 400;
}

.eyebrow::before {
content: ‘’;
display: block;
width: 32px;
height: 1px;
background: #ff4500;
}

.headline {
font-family: ‘MeshedDisplay’, serif;
font-size: clamp(3rem, 7vw, 6rem);
line-height: 0.9;
text-transform: uppercase;
color: #ff4500;
letter-spacing: 0.01em;
margin-bottom: 48px;
}

.desc {
font-family: ‘DM Sans’, sans-serif;
font-size: 0.65rem;
letter-spacing: 0.15em;
text-transform: uppercase;
color: #1a1a1a;
line-height: 2.2;
font-weight: 400;
margin-bottom: 48px;
max-width: 400px;
}

.notify-form {
display: flex;
gap: 0;
max-width: 420px;
}

.notify-input {
flex: 1;
background: transparent;
