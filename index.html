<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="color-scheme" content="light only">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IvoryClause — Coming Soon</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root { color-scheme: light only; }
html, body {
  background: #f5f0e8 !important;
  color: #1a1a1a !important;
  height: 100%;
  font-family: 'Inter', sans-serif;
}
body {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  padding: 48px 64px;
}
.wordmark {
  font-family: 'Inter', sans-serif;
  font-size: clamp(1.6rem, 3vw, 2.2rem);
  font-weight: 900;
  letter-spacing: -0.02em;
  text-transform: uppercase;
  color: #1a1a1a;
  text-decoration: none;
}
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  max-width: 700px;
}
.eyebrow {
  font-family: 'Inter', sans-serif;
  font-size: 0.7rem;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  color: #e8000d;
  margin-bottom: 32px;
  display: flex;
  align-items: center;
  gap: 14px;
  font-weight: 700;
}
.eyebrow::before {
  content: '';
  display: block;
  width: 32px;
  height: 1px;
  background: #e8000d;
}
.headline {
  font-family: 'Inter', sans-serif;
  font-size: clamp(3rem, 7vw, 6rem);
  font-weight: 900;
  line-height: 0.9;
  text-transform: uppercase;
  color: #e8000d;
  letter-spacing: -0.03em;
  margin-bottom: 48px;
}
.desc {
  font-family: 'Inter', sans-serif;
  font-size: 0.78rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #1a1a1a;
  line-height: 2;
  font-weight: 500;
  margin-bottom: 48px;
  max-width: 400px;
}
.notify-form {
  display: flex;
  gap: 0;
  max-width: 420px;
}
.notify-input {
  flex: 1;
  background: transparent;
  border: 1px solid #1a1a1a;
  border-right: none;
  padding: 14px 20px;
  font-family: 'Inter', sans-serif;
  font-size: 0.7rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: #1a1a1a;
  outline: none;
}
.notify-input::placeholder {
  color: rgba(26,26,26,0.4);
}
.notify-btn {
  background: #1a1a1a;
  color: #f5f0e8;
  border: none;
  padding: 14px 28px;
  font-family: 'Inter', sans-serif;
  font-size: 0.7rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  cursor: pointer;
  font-weight: 700;
  transition: background 0.18s;
}
.notify-btn:hover { background: #e8000d; }
.footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-top: 1px solid rgba(26,26,26,0.1);
  padding-top: 24px;
  flex-wrap: wrap;
  gap: 16px;
}
.footer-note {
  font-family: 'Inter', sans-serif;
  font-size: 0.6rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: #1a1a1a;
  opacity: 0.4;
  font-weight: 500;
}
@media(max-width: 600px) {
  body { padding: 32px 24px; }
  .notify-form { flex-direction: column; }
  .notify-input { border-right: 1px solid #1a1a1a; border-bottom: none; }
}
</style>
</head>
<body>

<a href="/" class="wordmark">IvoryClause</a>

<div class="main">
  <div class="eyebrow">Wedding Vendor Contracts</div>
  <div class="headline">Coming<br>Soon.</div>
  <div class="desc">
    Attorney-reviewed contracts for photographers, florists, DJs, and every wedding vendor.<br><br>
    Launching soon. Get notified when we go live.
  </div>
  <div class="notify-form">
    <input class="notify-input" type="email" placeholder="Your email">
    <button class="notify-btn">Notify Me</button>
  </div>
</div>

<div class="footer">
  <div class="footer-note">© 2026 IvoryClause — Protect Your Art.</div>
  <div class="footer-note">ivoryclause.com</div>
</div>

</body>
</html>
